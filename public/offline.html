<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MegaDen — Offline</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', Arial, sans-serif;
      background: #0b0e1a;
      color: #e8eaf6;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 1.5rem;
    }
    .box { max-width: 320px; }
    h1 { font-family: 'Outfit', sans-serif; font-size: 1.3rem; margin-bottom: 0.5rem; }
    p { color: #8b90b8; font-size: 0.9rem; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      padding: 0.75rem 1.6rem;
      background: #6c4ef2;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>You're offline</h1>
    <p>MegaDen needs an internet connection. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
